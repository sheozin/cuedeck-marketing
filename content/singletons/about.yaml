heroHeadline: "Built by event professionals, for event professionals."
heroTagline: "CueDeck was born in the chaos of live events \u2014 backstage, on comms, watching schedules slip. We built the tool we always wished existed."
missionHeading: Calm under pressure. Always.
missionBody: "Live events are unforgiving. When a speaker is late, a session overruns, or AV goes down, every second counts. Most production teams still rely on radio chatter, shared spreadsheets, and hope.\n\nCueDeck replaces that friction with a single real-time console. Directors see everything. Stage managers act instantly. AV, interpreters, registration, and signage all stay in sync \u2014 automatically.\n\nWe believe the best events look effortless because the team behind them has the right tools. CueDeck is that tool."
quoteText: "We cut our pre-event briefing from 45 minutes to 10. Everyone already knows their role, their cues, and their fallback. CueDeck made that possible."
quoteAuthor: "\u2014 Lead Producer, AVE Events International"
ctaHeading: Ready to run your event like a pro?
ctaSubtext: Start your free 3-day trial. No credit card required.
