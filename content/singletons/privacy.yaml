intro: "CueDeck (\"we\", \"us\", or \"our\") operates the CueDeck live event management platform. This Privacy Policy explains how we collect, use, disclose, and safeguard your information when you use our service. Please read this policy carefully. If you disagree with its terms, please discontinue use of the service."
dataCollection: "We collect information you provide directly, including: your name, email address, and password when you create an account; payment information processed securely via our payment provider (we do not store card numbers); event data, session schedules, and operator information you enter into the platform; and communications you send to us.\n\nWe also collect information automatically, including: log data (IP address, browser type, pages visited, timestamps); device information; and usage data such as features accessed and actions taken within the console."
howWeUse: "We use the information we collect to: provide, maintain, and improve the CueDeck service; process transactions and send related information; send technical notices and support messages; respond to your comments and questions; and monitor and analyse usage and trends to improve the platform.\n\nWe do not use your event data for advertising. Your session schedules, operator lists, and broadcast messages are your data \u2014 we access them only as necessary to provide the service or when required by law."
dataSharing: "We do not sell, trade, or rent your personal information to third parties. We may share information with: service providers who perform services on our behalf (hosting, payment processing, analytics) subject to confidentiality obligations; business partners with your consent; and law enforcement or government bodies when required by applicable law."
dataRetention: "We retain your account information for as long as your account is active or as needed to provide the service. Event data is retained for 12 months after an event's end date, after which it may be deleted or anonymised. You may request deletion of your account and associated data at any time by contacting us."
security: "We implement appropriate technical and organisational measures to protect your personal information against unauthorised access, alteration, disclosure, or destruction. All data is encrypted in transit using TLS and at rest using AES-256. However, no method of transmission over the internet is 100% secure, and we cannot guarantee absolute security."
gdprRights: "If you are located in the European Economic Area, you have the right to: access the personal data we hold about you; request correction of inaccurate data; request deletion of your data (right to erasure); object to or restrict processing; and data portability. To exercise these rights, contact privacy@cuedeck.io. We will respond within 30 days."
cookies: "We use strictly necessary cookies to keep you signed in and maintain your session. We do not use advertising or tracking cookies. You may disable cookies in your browser settings, but this will prevent you from signing in to the service."
contactUs: "For questions about this Privacy Policy, contact us at privacy@cuedeck.io."
